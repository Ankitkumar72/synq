name: synq
description: "Task and Notes App."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.7


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  google_sign_in: ^7.2.0
  collection: ^1.19.1
  flutter_local_notifications: 18.0.1
  timezone: 0.10.0
  flutter_quill: ^11.5.0
  markdown_quill: ^4.3.0
  markdown: ^7.2.2
  super_clipboard: ^0.9.1
  html2md: ^1.3.2
  firebase_messaging: ^16.1.2
  http: ^1.6.0
  firebase_app_check: ^0.4.1+5
  just_audio: ^0.9.43
  device_info_plus: ^11.5.0
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"


flutter:

  
  uses-material-design: true

  
  assets:
    - assets/images/
    - assets/audio/

